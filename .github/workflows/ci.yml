name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.css'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'biome.json'
      - 'tsconfig.json'
      - 'vite.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.css'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'biome.json'
      - 'tsconfig.json'
      - 'vite.config.*'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format & Lint (Biome)
        run: pnpm check
      - name: Type check (TypeScript)
        run: pnpm typecheck
      - name: Test (Vitest)
        run: pnpm test